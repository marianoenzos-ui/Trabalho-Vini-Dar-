<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Escolar Pro - UNISAGRADO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #D01D21; 
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
            --gray-light: #eee;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }

        .login-card {
            background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 450px; text-align: center;
        }

        .login-card img { max-height: 60px; margin-bottom: 20px; }

        /* --- INTERFACE PRINCIPAL --- */
        #main-content { display: none; }

        header {
            background: white; padding: 15px 20px; border-bottom: 4px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
        }

        .user-info { font-size: 0.9rem; display: flex; align-items: center; gap: 15px; }
        .btn-logout { background: #666; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        .container { max-width: 1500px; margin: 20px auto; padding: 0 20px; }
        
        /* --- AJUSTE EXPANDIDO DAS COLUNAS --- */
        main { 
            display: grid; 
            grid-template-columns: 400px 1fr 350px; /* Coluna de agendamento aumentada para 400px */
            gap: 25px; 
            align-items: start; 
        }

        .card { 
            background: white; 
            padding: 25px; /* Mais preenchimento interno para não parecer apertado */
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        h2 { font-size: 1.2rem; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 12px; margin-top: 0; margin-bottom: 20px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        
        label { font-weight: bold; font-size: 0.85rem; color: #444; }
        
        input, select, textarea { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-family: inherit; 
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box; /* Garante que o padding não estoure a largura */
        }

        textarea { resize: vertical; min-height: 100px; }
        
        /* --- ESPAÇAMENTO REFORÇADO NAS HORAS --- */
        .row-horas { 
            display: flex; 
            gap: 30px; /* Espaço generoso entre Início e Término */
            margin-bottom: 15px;
        }
        .hora-item { flex: 1; }

        button.btn-add {
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px;
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            width: 100%;
            transition: background 0.2s;
        }

        button.btn-add:hover { background: #aa171a; }

        /* Lista Lateral */
        .item-compromisso { 
            border-left: 5px solid var(--primary); 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        #calendar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        @media (max-width: 1200px) { 
            main { grid-template-columns: 1fr; } 
            .container { max-width: 800px; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="image_0.png" alt="Logo UNISAGRADO">
            <h3>Acesso ao Gestor Escolar</h3>
            <div class="form-group" style="text-align: left;">
                <label>Nome Completo</label>
                <input type="text" id="loginUser" placeholder="Ex: Vinicius Algusto Dare de Almeida">
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Cargo/Função</label>
                <select id="loginRole">
                    <option value="Professor(a)">Professor(a)</option>
                    <option value="Reitoria">Reitoria</option>
                </select>
            </div>
            <button class="btn-add" onclick="realizarLogin()">Acessar Sistema</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <img src="image_0.png" alt="Logo" style="height: 45px;">
            <div class="user-info">
                <span>Conectado: <strong id="userNameDisplay">Usuário</strong></span>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
        </header>

        <div class="container">
            <main>
                <section class="card">
                    <h2>Agendar Reunião</h2>
                    <div class="form-group">
                        <label>Responsável pelo Agendamento</label>
                        <input type="text" id="compAutor" readonly style="background: #f4f4f4; border-color: #eee;">
                    </div>
                    <div class="form-group">
                        <label>Título do Evento</label>
                        <input type="text" id="compTitulo" placeholder="Ex: Reunião de Colegiado">
                    </div>
                    <div class="form-group">
                        <label>Pauta / Observações</label>
                        <textarea id="compDesc" placeholder="Descreva os pontos principais..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Data da Reunião</label>
                        <input type="date" id="compData">
                    </div>

                    <div class="row-horas">
                        <div class="hora-item">
                            <label>Início</label>
                            <input type="time" id="horaInicio">
                        </div>
                        <div class="hora-item">
                            <label>Término</label>
                            <input type="time" id="horaFim">
                        </div>
                    </div>

                    <button class="btn-add" onclick="adicionarAoCalendario()">Confirmar Agendamento</button>
                </section>

                <section><div id="calendar"></div></section>

                <section class="card">
                    <h2>Próximos Compromissos</h2>
                    <div id="listaProximos" style="max-height: 75vh; overflow-y: auto; padding-right: 5px;"></div>
                </section>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <script>
        let calendar;
        let usuarioNome = "";
        let usuarioCargo = "";

        function realizarLogin() {
            const nome = document.getElementById('loginUser').value.trim();
            const cargo = document.getElementById('loginRole').value;
            if(!nome) return alert("Por favor, insira seu nome.");
            usuarioNome = nome;
            usuarioCargo = cargo;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = `${usuarioNome} (${usuarioCargo})`;
            document.getElementById('compAutor').value = usuarioNome;
            initCalendar();
        }

        function logout() { location.reload(); }

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: JSON.parse(localStorage.getItem('agenda_escolar')) || [],
                eventClick: function(info) {
                    const criador = info.event.extendedProps.autor;
                    if (usuarioCargo === 'Reitoria' || usuarioNome === criador) {
                        if (confirm(`Excluir: ${info.event.title}?`)) {
                            info.event.remove();
                            salvarDados();
                        }
                    } else {
                        alert("Você não tem permissão para remover este agendamento.");
                    }
                }
            });
            calendar.render();
            renderLista();
        }

        function adicionarAoCalendario() {
            const titulo = document.getElementById('compTitulo').value;
            const desc = document.getElementById('compDesc').value;
            const data = document.getElementById('compData').value;
            const hI = document.getElementById('horaInicio').value;
            const hF = document.getElementById('horaFim').value;

            if(!titulo || !data || !hI || !hF) return alert("Por favor, preencha todos os campos!");

            const start = `${data}T${hI}`;
            const end = `${data}T${hF}`;

            const temConflito = calendar.getEvents().some(e => (new Date(start) < new Date(e.end) && new Date(end) > new Date(e.start)));
            if(temConflito) return alert("⚠️ Conflito: Este horário já está ocupado.");

            calendar.addEvent({
                title: `${usuarioNome}: ${titulo}`,
                start: start,
                end: end,
                extendedProps: { autor: usuarioNome, cargo: usuarioCargo, descricao: desc }
            });

            salvarDados();
            limparCampos();
        }

        function salvarDados() {
            const eventos = calendar.getEvents().map(e => ({
                title: e.title, start: e.startStr, end: e.endStr, extendedProps: e.extendedProps
            }));
            localStorage.setItem('agenda_escolar', JSON.stringify(eventos));
            renderLista();
        }

        function renderLista() {
            const lista = document.getElementById('listaProximos');
            const eventos = calendar.getEvents().sort((a,b) => new Date(a.start) - new Date(b.start));
            lista.innerHTML = eventos.length ? '' : '<p style="text-align:center; color:#999;">Sem reuniões.</p>';
            eventos.forEach(e => {
                const d = new Date(e.start);
                const hI = d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
                const hF = new Date(e.end).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
                lista.innerHTML += `
                    <div class="item-compromisso">
                        <strong>${e.title}</strong>
                        <p>${e.extendedProps.descricao || "Sem pauta."}</p>
                        <span style="font-size:0.8rem;">📅 ${d.toLocaleDateString('pt-BR')} | ⏰ ${hI} - ${hF}</span>
                    </div>`;
            });
        }

        function limparCampos() {
            document.getElementById('compTitulo').value = '';
            document.getElementById('compDesc').value = '';
            document.getElementById('horaInicio').value = '';
            document.getElementById('horaFim').value = '';
        }
    </script>
</body>
</html>
